name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust toolchain
        run: rustup default stable && rustup update stable

      - name: cargo check
        run: cargo check --all-targets

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust toolchain
        run: rustup default stable && rustup update stable

      - name: cargo test
        run: cargo test --all-targets

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust toolchain with clippy
        run: rustup default stable && rustup update stable && rustup component add clippy

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust toolchain with rustfmt
        run: rustup default stable && rustup update stable && rustup component add rustfmt

      - name: cargo fmt --check
        run: cargo fmt -- --check
