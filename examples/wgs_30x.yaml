# wgs_30x.yaml — Standard 30x whole-genome sequencing with random mutations
#
# Suitable for benchmarking whole-genome variant callers such as Mutect2,
# VarDict, and Strelka2.  Generates 5 000 somatic mutations (80 % SNVs,
# 15 % indels, 5 % MNVs) at VAFs spanning the detectable range.
#
# Approximate runtime: 20–40 min on 8 cores for a 3 Gb genome.
#
# Run:
#   varforge simulate --config examples/wgs_30x.yaml

reference: /data/ref/hg38.fa

output:
  directory: out/wgs_30x
  fastq: true
  bam: true
  truth_vcf: true
  manifest: true

sample:
  name: WGS_TUMOUR
  read_length: 150
  coverage: 30.0
  platform: illumina

fragment:
  model: normal
  mean: 300.0
  sd: 50.0

quality:
  mean_quality: 36
  tail_decay: 0.003

tumour:
  purity: 0.70
  ploidy: 2

mutations:
  random:
    count: 5000
    vaf_min: 0.05
    vaf_max: 0.60
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05

gc_bias:
  enabled: true
  model: default
  severity: 1.0

seed: 42
threads: 8
