[package]
name = "varforge"
version = "0.1.0"
edition = "2021"
description = "Synthetic cancer sequencing test data generator"

[dependencies]
# Pure Rust bioinformatics I/O (no C dependencies)
noodles-bam = "0.68"
noodles-sam = "0.64"
noodles-vcf = "0.63"
noodles-bcf = "0.59"
noodles-fasta = "0.42"
noodles-fastq = "0.14"
noodles-bed = "0.15"
noodles-bgzf = "0.33"
noodles-csi = "0.38"
noodles-core = "0.15"
noodles-tabix = "0.43"

# Fast FASTQ writing
seq_io = "0.3"

# Alignment / sequence utilities
bio = "1.6"

# RNG and distributions
rand = "0.8"
rand_distr = "0.4"
statrs = "0.17"

# Parallelism
rayon = "1.10"

# Compression
gzp = "0.11"
flate2 = "1.0"

# CLI
clap = { version = "4", features = ["derive"] }

# Config / serialization
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Progress
indicatif = "0.17"

# Error handling
anyhow = "1"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
approx = "0.5"
