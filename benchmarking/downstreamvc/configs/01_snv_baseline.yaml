# Scenario 1: SNV baseline (30x, chr22)
# Clean reads, no artefacts. Establishes baseline sensitivity and precision.
# Expected: >90% sensitivity at VAF >0.20, >95% precision.
reference: ../../chr22.fa
output:
  directory: OUTPUT_DIR/01_snv_baseline
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true
sample:
  name: SNV_BASELINE
  read_length: 150
  coverage: 30.0
fragment:
  model: normal
  mean: 300.0
  sd: 50.0
mutations:
  random:
    count: 500
    vaf_min: 0.05
    vaf_max: 0.50
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05
tumour:
  purity: 0.80
chromosomes:
  - chr22
seed: 42
