# Scenario 4: Panel + UMI, high depth (200x, 1 Mbp BED target on chr22)
# High-depth targeted panel with UMI simplex tags.
# Tests caller performance at depth typical of liquid biopsy panels.
# Note: UMI deduplication (fgbio/HUMID) is not applied in this benchmark;
# Mutect2 runs on raw aligned reads. Results are a lower bound for what a
# full UMI-aware pipeline would achieve.
reference: REF_PATH
output:
  directory: OUTPUT_DIR/04_panel_umi
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true
sample:
  name: PANEL_UMI
  read_length: 150
  coverage: 200.0
fragment:
  model: normal
  mean: 180.0
  sd: 30.0
mutations:
  random:
    count: 50
    vaf_min: 0.01
    vaf_max: 0.20
    snv_fraction: 0.90
    indel_fraction: 0.08
    mnv_fraction: 0.02
tumour:
  purity: 0.10
umi:
  enabled: true
  length: 8
  duplex: false
regions_bed: BED_PATH
chromosomes:
  - chr22
seed: 45
