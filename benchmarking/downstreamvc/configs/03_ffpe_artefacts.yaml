# Scenario 3: FFPE artefacts (30x, chr22)
# FFPE damage and oxidative artefacts enabled.
# Tests whether Mutect2 artefact filters handle VarForge-generated FFPE noise.
# Compare FP rate against scenario 1 to measure artefact impact.
reference: REF_PATH
output:
  directory: OUTPUT_DIR/03_ffpe_artefacts
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true
sample:
  name: FFPE_ARTEFACTS
  read_length: 150
  coverage: 30.0
fragment:
  model: normal
  mean: 280.0
  sd: 60.0
mutations:
  random:
    count: 300
    vaf_min: 0.10
    vaf_max: 0.50
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05
tumour:
  purity: 0.70
artifacts:
  ffpe_damage_rate: 0.02
  oxog_rate: 0.01
  pcr_error_rate: 0.001
chromosomes:
  - chr22
seed: 44
