# Benchmark 09: All features - 10MB ref, 100x, variants + UMI + artifacts
reference: benchmarking/ref_10mb.fa

output:
  directory: benchmarking/runs/09_all_features
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: ALL_FEATURES
  read_length: 150
  coverage: 100.0

fragment:
  model: normal
  mean: 300.0
  sd: 50.0

quality:
  mean_quality: 36
  tail_decay: 0.003

tumour:
  purity: 0.70
  ploidy: 2

mutations:
  random:
    count: 500
    vaf_min: 0.05
    vaf_max: 0.50
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05

umi:
  length: 8
  duplex: false
  pcr_cycles: 10
  family_size_mean: 3.0
  family_size_sd: 1.5
  inline: true

artifacts:
  ffpe_damage_rate: 0.01
  oxog_rate: 0.005
  duplicate_rate: 0.10
  pcr_error_rate: 0.001

gc_bias:
  enabled: true
  model: default
  severity: 1.0

seed: 1
