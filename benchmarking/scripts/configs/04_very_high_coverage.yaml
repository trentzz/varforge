# Benchmark 04: Very high coverage - 1MB ref, 200x, 500 variants
# Note: reduced from 10MB/500x to 1MB/200x for memory feasibility (12GB RAM)
reference: benchmarking/ref_1mb.fa

output:
  directory: benchmarking/runs/04_very_high_coverage
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: VERY_HIGH_COV
  read_length: 150
  coverage: 200.0

fragment:
  model: normal
  mean: 300.0
  sd: 50.0

quality:
  mean_quality: 36
  tail_decay: 0.003

tumour:
  purity: 0.70
  ploidy: 2

mutations:
  random:
    count: 100
    vaf_min: 0.05
    vaf_max: 0.50
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05

seed: 1
