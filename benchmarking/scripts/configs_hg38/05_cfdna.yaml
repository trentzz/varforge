# cfDNA liquid biopsy simulation
reference: chr22.fa
output:
  directory: /tmp/hg38_bench_placeholder
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true
sample:
  name: CFDNA
  read_length: 150
  coverage: 200.0
fragment:
  model: cfdna
  mean: 167.0
  sd: 20.0
mutations:
  random:
    count: 200
    vaf_min: 0.001
    vaf_max: 0.05
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05
tumour:
  purity: 0.02
chromosomes:
  - chr22
seed: 42
